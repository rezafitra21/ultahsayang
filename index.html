<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hadiah Untuk Kamu ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff7eb3,#ff758c,#ffb199);
overflow:hidden;
}

.container{
text-align:center;
color:white;
}

h1{
font-size:40px;
margin-bottom:20px;
animation:fade 1s;
}

p{
margin-bottom:40px;
opacity:.9;
}

.gift{
position:relative;
width:220px;
height:180px;
margin:auto;
cursor:pointer;
transition:.5s;
}

.box{
position:absolute;
bottom:0;
width:220px;
height:120px;
background:#ff4d6d;
border-radius:8px;
}

.lid{
position:absolute;
top:0;
width:220px;
height:40px;
background:#ff758f;
border-radius:8px;
transform-origin:left bottom;
transition:1s;
}

.ribbon-v{
position:absolute;
left:95px;
width:30px;
height:180px;
background:white;
}

.ribbon-h{
position:absolute;
top:45px;
width:220px;
height:30px;
background:white;
}

.open .lid{
transform:rotate(-130deg);
}

.message{
opacity:0;
transform:translateY(30px);
transition:1s;
margin-top:40px;
}

.open + .message{
opacity:1;
transform:translateY(0);
}

button{
margin-top:25px;
padding:15px 35px;
border:none;
border-radius:30px;
font-size:18px;
background:white;
color:#ff4d6d;
font-weight:bold;
cursor:pointer;
display:none;
}

button.show{
display:inline-block;
animation:fade .8s;
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-20px;
animation:fall linear forwards;
}

@keyframes fall{

to{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}

}

@keyframes fade{

from{
opacity:0;
transform:translateY(-20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>
<body>

<div class="container">

<h1>🎁 Ada Hadiah Untuk Kamu</h1>

<p>Klik kotaknya ya sayang ❤️</p>

<div class="gift" id="gift">

<div class="lid"></div>

<div class="box"></div>

<div class="ribbon-v"></div>

<div class="ribbon-h"></div>

</div>

<div class="message">

<h2>🎉 Happy Birthday Sayang 🎂</h2>

<p>Aku punya sesuatu yang spesial buat kamu ❤️</p>

<button id="btn">Masuk</button>

</div>

</div>

<script>

const gift=document.getElementById("gift");
const btn=document.getElementById("btn");

gift.onclick=()=>{

gift.classList.add("open");

btn.classList.add("show");

confetti();

}

btn.onclick=()=>{

window.location.href="home.html";

}

function confetti(){

const colors=["#FFD700","#FF4D6D","#FFFFFF","#87CEFA","#98FB98"];

for(let i=0;i<150;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=colors[Math.floor(Math.random()*colors.length)];

c.style.animationDuration=Math.random()*2+2+"s";

c.style.width=Math.random()*8+6+"px";

c.style.height=c.style.width;

document.body.appendChild(c);

setTimeout(()=>c.remove(),4000);

}

}

</script>

</body>
</html>
